mode_definitions:
  rule_mode:
    planner_mode: "rule"
    extractor_mode: "rule"
    verifier_mode: "rule"
    llm_backend_active: false
    description: "Deterministic baseline. No LLM calls should be counted."

  llm_enhanced_mode:
    planner_mode: "llm"
    extractor_mode: "llm"
    verifier_mode: "llm"
    llm_backend_active: true
    description: >
      LLM-enhanced condition. If the backend is requested but inactive, label the
      run as llm_requested_but_inactive and do not count it as LLM-enhanced.

comparison_rules:
  llm_must_not_degrade:
    - top10_forbidden_pattern_rate
    - llm_invalid_evidence_rate
    - top10_out_of_scope_rate
  llm_should_improve_or_match:
    - intent_anchor_coverage
    - planned_query_anchor_coverage
    - query_family_coverage
    - aspect_coverage_at_10
    - report_section_completeness
    - feedback_directional_accuracy
  hard_fail_if:
    - "LLM-enhanced mode presents unverified evidence as reliable"
    - "LLM-enhanced mode changes the intended scientific domain"
    - "LLM-enhanced mode increases top10_forbidden_pattern_rate above 0.10"
    - "LLM-enhanced mode is requested but silently falls back to rule-mode without trace"