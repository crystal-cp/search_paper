version: 1

description: >
  Benchmark cases for evaluating search_paper as a human-centric multi-agent
  scientific literature screening system. These cases test novice intent repair,
  QueryFamily planning, provider retrieval, evidence grounding, domain guardrails,
  ranking, paper roles, feedback adaptation, and user-facing report quality.

global_defaults:
  enabled_providers:
    - openalex
    - semantic_scholar

  default_thresholds:
    intent_anchor_coverage_min: 0.70
    required_aspect_recall_in_brief_min: 0.70
    planned_query_anchor_coverage_min: 0.75
    query_family_coverage_min: 0.70
    forbidden_query_leakage_rate_max: 0.00
    min_raw_results: 20
    min_merged_results: 15
    retrieval_anchor_recall_min: 0.60
    top10_domain_in_scope_rate_min: 0.80
    top10_forbidden_pattern_rate_max: 0.10
    aspect_coverage_at10_min: 0.60
    strict_support_rate_min_rule: 0.45
    strict_support_rate_min_llm: 0.55
    llm_invalid_evidence_rate_max: 0.05
    paper_role_assignment_rate_min: 0.70
    report_section_completeness_min: 0.85
    feedback_directional_accuracy_min: 0.80

  required_report_sections:
    - research_question_interpretation
    - search_strategy_or_query_families
    - screening_and_inclusion_criteria
    - ranked_papers
    - evidence_grounding
    - domain_guardrail_or_uncertainty
    - paper_roles_or_reading_path
    - research_gaps
    - suggested_next_searches
    - feedback_effects_if_feedback_provided

cases:
  - id: sei_lithium_battery
    display_name: "SEI lithium battery"
    domain: "battery materials"
    novice_question_zh: "我想找锂电池里 SEI 是什么、怎么影响锂金属电池循环和枝晶，尤其人工 SEI 的文章。"
    canonical_intent: >
      Screen literature on solid electrolyte interphase formation, chemistry,
      characterization, and artificial SEI design for lithium metal or lithium-ion batteries.
    plan_only_eligible: true
    full_retrieval_required: true
    gold_labels_path: "data/gold_labels/sei_lithium_battery.csv"

    ambiguous_terms:
      - term: "SEI"
        intended_meaning: "solid electrolyte interphase"
        forbidden_meanings:
          - "social emotional intelligence"
          - "Software Engineering Institute"
          - "solar energy index"

    expected_query_anchors:
      - id: sei_core
        any_of:
          - "solid electrolyte interphase"
          - "SEI"
          - "solid-electrolyte interphase"
      - id: lithium_metal_context
        any_of:
          - "lithium metal anode"
          - "Li metal"
          - "lithium metal battery"
          - "LMB"
      - id: electrolyte_decomposition
        any_of:
          - "electrolyte decomposition"
          - "interphase chemistry"
          - "SEI composition"
          - "LiF-rich"
          - "inorganic-rich SEI"
      - id: dendrite_and_cycling
        any_of:
          - "lithium dendrite"
          - "dendrite suppression"
          - "uniform Li deposition"
          - "cycling stability"
      - id: artificial_sei
        any_of:
          - "artificial SEI"
          - "artificial solid electrolyte interphase"
          - "protective interphase"
          - "SEI engineering"
      - id: characterization
        any_of:
          - "cryo-EM"
          - "XPS"
          - "AFM"
          - "TOF-SIMS"
          - "electron microscopy"

    expected_aspects:
      - id: formation_mechanism
        any_of:
          - "formation mechanism"
          - "electrolyte decomposition"
          - "first cycle"
      - id: composition_structure
        any_of:
          - "SEI composition"
          - "SEI structure"
          - "organic inorganic components"
      - id: ion_transport_mechanics
        any_of:
          - "Li-ion transport"
          - "ionic conductivity"
          - "mechanical properties"
      - id: dendrite_cycling
        any_of:
          - "dendrite growth"
          - "cycle life"
          - "Coulombic efficiency"
      - id: artificial_design
        any_of:
          - "artificial SEI design"
          - "protective layer"
          - "interface engineering"
      - id: characterization_methods
        any_of:
          - "characterization"
          - "cryo-EM"
          - "spectroscopy"
          - "microscopy"

    forbidden_top10_patterns:
      - "social emotional intelligence"
      - "software engineering institute"
      - "school engagement inventory"
      - "solar energy index"
      - "sustainable energy initiative"
      - "security engineering institute"

    false_positive_types:
      - "SEI acronym from psychology, education, software, or energy policy"
      - "solid electrolyte papers that do not discuss interphase formation"
      - "generic battery management or state-of-charge papers"
      - "cathode-only papers without SEI/interphase relevance"
      - "corrosion/passivation films unrelated to lithium batteries"

    expected_role_hints:
      - "review_background"
      - "mechanism_or_theory"
      - "characterization_method"
      - "material_case"
      - "design_strategy"

    feedback_scenario:
      include_when_matches_any:
        - "artificial SEI"
        - "lithium metal anode"
        - "dendrite suppression"
      exclude_when_matches_any:
        - "social emotional intelligence"
        - "software engineering"
        - "cathode only"
      expected_effect: "included artificial-SEI papers move upward; non-battery SEI false positives move downward"

